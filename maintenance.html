<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>We are working on this</title>
    <link rel="icon" type="image/svg+xml" href="/src/images/logo/favicon.svg" />
    <link rel="stylesheet" href="./src/css/reset.css" />
    <link rel="stylesheet" href="./src/css/index.css" />
    <link rel="stylesheet" href="./src/css/maintenance.css" />
  </head>
  <body>
    <!-- Maintenance section -->
    <section class="maintenance-section" aria-label="Maintenance">
      <div class="maintenance-section__inner">
        <h1>We are working on this</h1>
        <h3>Ooooh yeah, it's cooking.</h3>
        <p class="maintenance-section__body">
          If you want to be notified when we are back, just leave us your email
          address. Only if you want to... we don't force anyone... or do we.
        </p>
        <form class="maintenance-form" action="#" method="post" novalidate>
          <input
            class="field field--maintenance"
            type="email"
            name="email"
            placeholder="Your e-mail"
          />
          <button type="submit" class="btn btn--primary btn--maintenance">
            Do it
            <img
              src="src/images/svg/ArrowUpRightWhite.svg"
              alt=""
              aria-hidden="true"
            />
          </button>
        </form>
      </div>
    </section>
  </body>
</html>
